name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Least-privilege default for every job below.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Rust: format, lint (warnings are errors), build, test.
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Third-party actions are pinned to a full commit SHA (supply-chain guard),
      # matching the SHAs already vetted in android.yml.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0
          components: clippy,rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Build
        run: cargo build --locked --verbose

      - name: Test
        run: cargo test --locked --verbose

  # Rust dependency vulnerability scan (RustSec advisory DB). cargo-audit is
  # installed from crates.io rather than via a third-party action so there is no
  # extra unpinned action in the supply chain.
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked
      # Real vulnerabilities still fail the build (cargo-audit's default). We do
      # NOT pass `--deny warnings`: a *yanked* crate (e.g. the transitive `spin`
      # 0.9.8 pulled in via sqlx) is not a vulnerability and shouldn't gate CI.
      # RUSTSEC-2023-0071 (rsa "Marvin attack") has no fixed release and reaches
      # us only through sqlx's unused `sqlx-mysql` optional dependency — the MySQL
      # driver is never compiled (only the `sqlite` feature is enabled), so the
      # advisory is not reachable here. Ignored by explicit ID so any *new*
      # advisory still fails CI.
      - name: Audit backend dependencies
        run: cargo audit --ignore RUSTSEC-2023-0071
      - name: Audit Android app dependencies
        working-directory: app/src-tauri
        run: cargo audit --ignore RUSTSEC-2023-0071

  # Web UI: strict typecheck, ESLint (incl. eslint-plugin-security), npm audit.
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit, strict)
        run: npm run typecheck

      - name: Lint (ESLint + security rules)
        run: npm run lint

      - name: Audit dependencies
        run: npm audit --audit-level=high

      # Fail if the committed web/ bundle is stale vs. the TS sources, so the
      # linted/typechecked source is always what actually ships.
      - name: Verify committed build is up to date
        run: |
          npm run build
          if ! git diff --quiet -- ../web; then
            echo "::error::web/ is out of date — run 'npm run build' in frontend/ and commit the result."
            git --no-pager diff --stat -- ../web
            exit 1
          fi

  image:
    name: Publish verified image
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [rust, cargo-audit, web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/whale"
          tags="$image:sha-$GITHUB_SHA"
          version="sha-$GITHUB_SHA"
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            tags+=$'\n'"$image:latest"
          else
            version="${GITHUB_REF#refs/tags/}"
            tags+=$'\n'"$image:$version"
          fi
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Read yt-dlp version
        id: ytdlp
        run: echo "version=$(tr -d '\n' < YTDLP_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          build-args: |
            YTDLP_VERSION=${{ steps.ytdlp.outputs.version }}
            VCS_REF=${{ github.sha }}
            IMAGE_VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
