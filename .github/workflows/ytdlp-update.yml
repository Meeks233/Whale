name: yt-dlp Update

# Poll yt-dlp's stable channel daily. A verified pin is committed to main; the
# normal CI workflow then tests the repository state and publishes the image.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

# Never let two update runs race on the YTDLP_VERSION commit/push.
concurrency:
  group: ytdlp-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine versions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current="$(cat YTDLP_VERSION)"
          latest="$(gh api repos/yt-dlp/yt-dlp/releases/latest --jq '.tag_name')"
          [[ "$latest" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}$ ]] || { echo "invalid release tag: $latest" >&2; exit 1; }
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$latest" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify upstream checksum
        if: steps.check.outputs.changed == 'true'
        id: checksum
        env:
          LATEST: ${{ steps.check.outputs.latest }}
        run: |
          sums="$(curl --fail --location --retry 3 "https://github.com/yt-dlp/yt-dlp/releases/download/$LATEST/SHA2-256SUMS")"
          sha="$(awk '$2 == "yt-dlp" { print $1 }' <<< "$sums")"
          [[ "$sha" =~ ^[0-9a-f]{64}$ ]] || { echo "missing yt-dlp checksum" >&2; exit 1; }
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Commit bumped YTDLP_VERSION
        if: steps.check.outputs.changed == 'true'
        env:
          # Pass the tag via env (not inline ${{ }}) so it can't break out of the
          # shell command — it's the single source of truth every build pins to.
          LATEST: ${{ steps.check.outputs.latest }}
        run: |
          printf '%s\n' "$LATEST" > YTDLP_VERSION
          printf '%s\n' '${{ steps.checksum.outputs.sha }}' > YTDLP_SHA256
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add YTDLP_VERSION YTDLP_SHA256
          git commit -m "chore: bump yt-dlp to $LATEST"
          git push

      - name: Summary
        if: always()
        env:
          CURRENT: ${{ steps.check.outputs.current }}
          LATEST: ${{ steps.check.outputs.latest }}
          CHANGED: ${{ steps.check.outputs.changed }}
        run: |
          if [ "$CHANGED" = "true" ]; then
            echo "yt-dlp **$CURRENT -> $LATEST** pin committed; gated CI will publish it." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "yt-dlp already up to date at **$CURRENT**." >> "$GITHUB_STEP_SUMMARY"
          fi
