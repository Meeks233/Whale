name: yt-dlp Update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/whale" >> "$GITHUB_OUTPUT"

      - name: Determine versions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current="$(cat YTDLP_VERSION)"
          latest="$(gh api repos/yt-dlp/yt-dlp/releases/latest --jq '.tag_name')"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$latest" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.check.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            YTDLP_VERSION=${{ steps.check.outputs.latest }}
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:ytdlp-${{ steps.check.outputs.latest }}

      - name: Commit bumped YTDLP_VERSION
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "${{ steps.check.outputs.latest }}" > YTDLP_VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add YTDLP_VERSION
          git commit -m "chore: bump yt-dlp to ${{ steps.check.outputs.latest }}"
          git push
