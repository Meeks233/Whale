name: Build & Push Image

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/whale

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read YTDLP_VERSION
        id: ytdlp
        run: echo "version=$(cat YTDLP_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            YTDLP_VERSION=${{ steps.ytdlp.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ steps.sha.outputs.short }}
