name: Android release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
    inputs:
      publish_play:
        description: Upload the signed AAB to Google Play
        type: boolean
        default: false
      play_track:
        description: Google Play track
        type: choice
        options: [internal, alpha, beta, production]
        default: internal

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: android-release
    permissions:
      contents: write
    env:
      ORCA_ANDROID_KEYSTORE_PATH: /tmp/orca-release.jks
      ORCA_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ORCA_ANDROID_KEYSTORE_PASSWORD }}
      ORCA_ANDROID_KEY_ALIAS: ${{ secrets.ORCA_ANDROID_KEY_ALIAS }}
      ORCA_ANDROID_KEY_PASSWORD: ${{ secrets.ORCA_ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate release version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          configured="$(node -p "require('./app/src-tauri/tauri.conf.json').version")"
          test "v$configured" = "$GITHUB_REF_NAME"

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" \
            "build-tools;35.0.0" "ndk;27.2.12479018"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install Rust toolchain and Android targets
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app/src-tauri

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@802977a265b5f8825ebef2176db5f5f3edc82280 # main

      - name: Install cargo-tauri
        run: cargo binstall -y 'tauri-cli@2.11.4'

      # The Tauri app embeds web/ (frontendDist). That bundle is committed, so a
      # stale one would ship silently — rebuild it here rather than trusting the
      # working tree (ci.yml only *checks* freshness, and this job doesn't need it).
      - name: Build frontend bundle
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ORCA_ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          base64 --decode <<< "$KEYSTORE_BASE64" > "$ORCA_ANDROID_KEYSTORE_PATH"
          chmod 600 "$ORCA_ANDROID_KEYSTORE_PATH"

      - name: Build signed APK and AAB
        working-directory: app
        run: cargo tauri android build --apk --aab --target aarch64 armv7

      - name: Stage release files
        run: |
          version="$(node -p "require('./app/src-tauri/tauri.conf.json').version")"
          mkdir -p dist
          install -m 0644 app/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab "dist/orca-$version.aab"
          install -m 0644 app/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk "dist/orca-$version.apk"
          sha256sum dist/orca-* > dist/SHA256SUMS
          # R8 is on (isMinifyEnabled), so without this Play shows obfuscated
          # stack traces. Kept out of SHA256SUMS: it is a debug aid, not a release
          # artifact users verify.
          mapping="app/src-tauri/gen/android/app/build/outputs/mapping/universalRelease/mapping.txt"
          if [ -f "$mapping" ]; then install -m 0644 "$mapping" dist/mapping.txt; fi

      # Play's "what's new" is generated from the fastlane changelogs so there is
      # ONE source of truth per locale. The filename must be the versionCode,
      # which tauri-cli derives from tauri.conf.json's version — deriving it the
      # same way here means a version bump can't silently ship a stale changelog.
      - name: Assemble Play changelogs
        run: |
          code="$(node -p "const [a,b,c]=require('./app/src-tauri/tauri.conf.json').version.split('.').map(Number); a*1000000+b*1000+c")"
          mkdir -p dist/whatsnew
          for loc in en-US zh-CN; do
            src="fastlane/metadata/android/$loc/changelogs/$code.txt"
            if [ ! -f "$src" ]; then
              echo "::error::missing changelog $src for versionCode $code" >&2
              exit 1
            fi
            install -m 0644 "$src" "dist/whatsnew/whatsnew-$loc"
          done

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: orca-android-release
          path: dist/
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        # Explicit list, not dist/*: that glob would now pick up the whatsnew/
        # directory (gh rejects it) and the R8 mapping, which is a Play debug aid
        # rather than something users download.
        run: gh release create "$GITHUB_REF_NAME" dist/orca-* dist/SHA256SUMS --verify-tag --generate-notes --title "Orca $GITHUB_REF_NAME"

  play:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_play
    needs: build
    runs-on: ubuntu-latest
    environment: google-play
    steps:
      - name: Checkout release metadata
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download signed release
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: orca-android-release
          path: dist

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.meeks233.orca
          releaseFiles: dist/*.aab
          tracks: ${{ inputs.play_track }}
          status: completed
          # Generated from fastlane/metadata/**/changelogs/<versionCode>.txt by the
          # build job, and downloaded here as part of the release artifact.
          whatsNewDirectory: dist/whatsnew
          mappingFile: dist/mapping.txt
