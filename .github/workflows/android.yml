name: Android APK

# Builds the Tauri Android shell (app/) into an installable debug APK.
# The app reuses web/ as its frontend, so changes there rebuild it too.
on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    paths:
      - "app/**"
      - "web/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach the APK to a GitHub Release on tag pushes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Gradle 8.14 needs JDK 17-21 (it rejects JDK 25). Temurin 21 matches the
      # documented local setup in app/README.md.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      # compileSdk/targetSdk = 36, build-tools 35.0.0 and NDK r27c match the
      # versions that build the app locally (see app/README.md).
      - name: Install SDK packages (platform 36, build-tools, NDK r27c)
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" \
            "build-tools;35.0.0" "ndk;27.2.12479018"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install Rust toolchain + Android targets
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Cache cargo (app workspace)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app/src-tauri

      - name: Install Tauri CLI
        uses: cargo-bins/cargo-binstall@802977a265b5f8825ebef2176db5f5f3edc82280 # main

      - name: Install cargo-tauri
        run: cargo binstall -y 'tauri-cli@^2.0.0'

      # Universal debug APK containing only arm64-v8a + armeabi-v7a (no x86 —
      # those ABIs are emulator-only and not published). The debug keystore
      # auto-signs it, so it is directly installable via adb.
      - name: Build debug APK (arm64-v8a + armeabi-v7a)
        working-directory: app
        run: cargo tauri android build --debug --apk --target aarch64 armv7

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: whale-android-debug
          path: app/src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk
          if-no-files-found: error

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: app/src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk
