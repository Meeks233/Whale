services:
  orca:
    image: ${ORCA_IMAGE:-ghcr.io/meeks233/orca:latest}
    environment:
      # Access token. If unset, Orca generates a random 32-char token on startup
      # and prints it to the container log. Set it here to keep it stable.
      # ORCA_TOKEN: "change-me"
      ORCA_CONCURRENCY: "2"
      # Multi-threaded download: parallel fragments per job (Seal-style, default 4).
      ORCA_CONCURRENT_FRAGMENTS: "4"
      # Total download-rate cap, split across concurrent jobs. "0"/"none" disables.
      ORCA_LIMIT_RATE: "10M"
      ORCA_CLIENT_TOFU: "false"
      # Opt in on hosts using fake-IP DNS proxies (for example Clash/sing-box).
      ORCA_ALLOW_PRIVATE_DNS: "${ORCA_ALLOW_PRIVATE_DNS:-false}"
    volumes:
      - ./data:/data
      - ./downloads:/downloads
    ports: ["127.0.0.1:8080:8080"]
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
